name: Precept cognition gate

# Server-side enforcement: evaluate every PR's intent with the rule-based
# engine and fail the check when Precept would REJECT it. Unlike a local
# pre-commit hook, this can't be skipped with --no-verify.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up project
        run: uv sync

      - name: Evaluate PR intent
        env:
          # Passed via env (not interpolated into the shell) to avoid injection.
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" | uv run precept check --repo .
