# Pre-commit hook for Precept — enforces cognition gate before commit.
#
# In a project that wants enforcement, add to .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/qorstack/precept
#       rev: v0.5.0
#       hooks:
#         - id: precept-commit-check
#           args: [--strict]

- id: precept-commit-check
  name: Precept Cognition Check
  description: Ensure AI ran analyze_intent and the decision allows the commit.
  entry: precept commit-check
  language: python
  pass_filenames: false
  stages: [pre-commit]
